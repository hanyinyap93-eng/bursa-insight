# Render.com blueprint — deploys Bursa Insight as a single web service.
# Push the `bursa-insight` folder as your GitHub repo root, then in Render:
#   New + → Blueprint → pick the repo. It reads this file automatically.
services:
  - type: web
    name: bursa-insight
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
