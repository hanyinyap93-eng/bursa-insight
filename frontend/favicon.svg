<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ETHER">
  <style>
    .g { fill: #16a34a; }   /* green E  */
    .r { fill: #e3242b; }   /* red mirrored E */
    /* Dark mode: brighten so the mark pops on dark browser tabs */
    @media (prefers-color-scheme: dark) {
      .g { fill: #22c55e; }
      .r { fill: #f4434b; }
    }
  </style>
  <!-- green E -->
  <rect class="g" x="3.8"  y="12"   width="25" height="9"/>
  <rect class="g" x="3.8"  y="27.5" width="20" height="9"/>
  <rect class="g" x="3.8"  y="43"   width="25" height="9"/>
  <rect class="g" x="3.8"  y="12"   width="9"  height="40"/>
  <!-- red mirrored E -->
  <rect class="r" x="35.2" y="12"   width="25" height="9"/>
  <rect class="r" x="40.2" y="27.5" width="20" height="9"/>
  <rect class="r" x="35.2" y="43"   width="25" height="9"/>
  <rect class="r" x="51.2" y="12"   width="9"  height="40"/>
</svg>
